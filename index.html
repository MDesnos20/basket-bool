<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Basket Scoreboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .timer {
            text-align: center;
            font-size: 8vw;
            padding: 10px 0;
            font-weight: bold;
        }

        .teams {
            flex: 1;
            display: flex;
        }

        .team {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
        }

        .blue {
            background: #007bff;
        }

        .red {
            background: #dc3545;
        }

        .score {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20vw;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: space-around;
            padding-bottom: 10px;
        }

        .buttons button {
            font-size: 3vw;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #000;
        }

        .controls button {
            font-size: 2vw;
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            background: #333;
            color: white;
        }

        /* 🔥 Cache curseur en fullscreen */
        body:fullscreen {
            cursor: none;
        }

        body:-webkit-full-screen {
            cursor: none;
        }
    </style>
</head>

<body>

    <div class="timer" id="timer">00:00</div>

    <div class="teams">
        <div class="team blue">
            <div class="score" id="scoreA">0</div>
            <div class="buttons">
                <button onclick="addScore('A', -1)">-1</button>
                <button onclick="addScore('A', 1)">+1</button>
                <button onclick="addScore('A', 2)">+2</button>
                <button onclick="addScore('A', 3)">+3</button>
            </div>
        </div>

        <div class="team red">
            <div class="score" id="scoreB">0</div>
            <div class="buttons">
                <button onclick="addScore('B', -1)">-1</button>
                <button onclick="addScore('B', 1)">+1</button>
                <button onclick="addScore('B', 2)">+2</button>
                <button onclick="addScore('B', 3)">+3</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="startTimer()">▶ Play</button>
        <button onclick="stopTimer()">⏸ Pause</button>
        <button onclick="resetTimer()">⏱ Reset Timer</button>
        <button onclick="resetAll()">🔄 Reset All</button>
        <button onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsK7RYrHeDrBGRabVxCS1S21NxDI87Yy8",
            authDomain: "basket-boule.firebaseapp.com",
            databaseURL: "https://basket-boule-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "basket-boule",
            storageBucket: "basket-boule.firebasestorage.app",
            messagingSenderId: "606953532311",
            appId: "1:606953532311:web:33b0d958a2f3f64a54b2d2",
            measurementId: "G-HFZJDQREW4"
        };


        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LISTENER
        db.ref('match').on('value', snapshot => {
            let data = snapshot.val();

            if (!data) {
                db.ref('match').set({
                    scoreTeamA: 0,
                    scoreTeamB: 0,
                    timer: 0,
                    running: false,
                    lastStart: null
                });
                return;
            }

            document.getElementById('scoreA').innerText = data.scoreTeamA;
            document.getElementById('scoreB').innerText = data.scoreTeamB;

            updateTimerDisplay(data);
        });

        function updateTimerDisplay(data) {
            let seconds = data.timer;

            if (data.running && data.lastStart) {
                seconds += Math.floor((Date.now() - data.lastStart) / 1000);
            }

            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }

        // SCORE
        function addScore(team, value) {
            db.ref('match').transaction(match => {
                if (match) {
                    if (team === 'A') match.scoreTeamA += value;
                    if (team === 'B') match.scoreTeamB += value;
                    if (match.scoreTeamA < 0) match.scoreTeamA = 0;
                    if (match.scoreTeamB < 0) match.scoreTeamB = 0;
                }
                return match;
            });
        }

        // TIMER
        function startTimer() {
            db.ref('match').transaction(match => {
                if (match && !match.running) {
                    match.running = true;
                    match.lastStart = Date.now();
                }
                return match;
            });
        }

        function stopTimer() {
            db.ref('match').transaction(match => {
                if (match && match.running) {
                    match.timer += Math.floor((Date.now() - match.lastStart) / 1000);
                    match.running = false;
                    match.lastStart = null;
                }
                return match;
            });
        }

        function resetTimer() {
            db.ref('match').transaction(match => {
                if (match) {
                    match.timer = 0;
                    match.running = false;
                    match.lastStart = null;
                }
                return match;
            });
        }

        function resetAll() {
            db.ref('match').set({
                scoreTeamA: 0,
                scoreTeamB: 0,
                timer: 0,
                running: false,
                lastStart: null
            });
        }

        // FULLSCREEN
        function toggleFullscreen() {
            const elem = document.documentElement;

            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) {
                    elem.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        // 🔥 RACCOURCIS CLAVIER
        document.addEventListener('keydown', (e) => {
            if (e.key === 'f') {
                toggleFullscreen();
            }

            if (e.code === 'Space') {
                e.preventDefault();

                db.ref('match').once('value').then(snapshot => {
                    const match = snapshot.val();

                    if (match.running) {
                        stopTimer();
                    } else {
                        startTimer();
                    }
                });
            }
        });

        // REFRESH TIMER
        setInterval(() => {
            db.ref('match').once('value').then(snapshot => {
                updateTimerDisplay(snapshot.val());
            });
        }, 1000);

    </script>

</body>

</html>
