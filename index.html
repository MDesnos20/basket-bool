<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Basket Scoreboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .timer {
            text-align: center;
            font-size: 8vw;
            font-weight: bold;
        }

        .teams {
            flex: 1;
            display: flex;
        }

        .team {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
        }

        .blue {
            background: #007bff;
        }

        .red {
            background: #dc3545;
        }

        .score {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20vw;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: space-around;
        }

        .buttons button {
            font-size: 3vw;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: rgba(0, 0, 0, 0.3);
            color: white;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: black;
        }

        .controls button {
            font-size: 2vw;
            padding: 10px;
        }

        body:fullscreen,
        body:-webkit-full-screen {
            cursor: none;
        }
    </style>
</head>

<body>

    <div class="timer" id="timer">00:00</div>

    <div class="teams">
        <div class="team blue">
            <div class="score" id="scoreA">0</div>
            <div class="buttons">
                <button onclick="addScore('A', -1)">-1</button>
                <button onclick="addScore('A', 1)">+1</button>
                <button onclick="addScore('A', 2)">+2</button>
                <button onclick="addScore('A', 3)">+3</button>
            </div>
        </div>

        <div class="team red">
            <div class="score" id="scoreB">0</div>
            <div class="buttons">
                <button onclick="addScore('B', -1)">-1</button>
                <button onclick="addScore('B', 1)">+1</button>
                <button onclick="addScore('B', 2)">+2</button>
                <button onclick="addScore('B', 3)">+3</button>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="startTimer()">▶</button>
        <button onclick="stopTimer()">⏸</button>
        <button onclick="resetTimer()">⏱</button>
        <button onclick="resetAll()">🔄 Match</button>
        <button onclick="resetTournament()">🏆 Tournoi</button>
        <button onclick="toggleFullscreen()">⛶</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsK7RYrHeDrBGRabVxCS1S21NxDI87Yy8",
            authDomain: "basket-boule.firebaseapp.com",
            databaseURL: "https://basket-boule-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "basket-boule",
            storageBucket: "basket-boule.firebasestorage.app",
            messagingSenderId: "606953532311",
            appId: "1:606953532311:web:33b0d958a2f3f64a54b2d2",
            measurementId: "G-HFZJDQREW4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LISTENER
        db.ref('match').on('value', snap => {
            const data = snap.val();
            if (!data) return;

            scoreA.innerText = data.scoreTeamA;
            scoreB.innerText = data.scoreTeamB;

            updateTimer(data);
        });

        function updateTimer(data) {
            let seconds = data.timer;
            if (data.running && data.lastStart) {
                seconds += Math.floor((Date.now() - data.lastStart) / 1000);
            }
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            timer.innerText = `${m}:${s}`;
        }

        // SCORE
        function addScore(team, val) {
            db.ref('match').transaction(m => {
                if (!m) return m;
                if (team === 'A') m.scoreTeamA = Math.max(0, m.scoreTeamA + val);
                if (team === 'B') m.scoreTeamB = Math.max(0, m.scoreTeamB + val);
                return m;
            });
        }

        // TIMER
        function startTimer() {
            db.ref('match').transaction(m => {
                if (m && !m.running) {
                    m.running = true;
                    m.lastStart = Date.now();
                }
                return m;
            });
        }

        function stopTimer() {
            db.ref('match').transaction(m => {
                if (m && m.running) {
                    m.timer += Math.floor((Date.now() - m.lastStart) / 1000);
                    m.running = false;
                    m.lastStart = null;
                }
                return m;
            });
        }

        function resetTimer() {
            db.ref('match').transaction(m => {
                if (m) {
                    m.timer = 0;
                    m.running = false;
                    m.lastStart = null;
                }
                return m;
            });
        }

        function resetAll() {
            db.ref('match').set({
                teamA: "Team A",
                teamB: "Team B",
                scoreTeamA: 0,
                scoreTeamB: 0,
                timer: 0,
                running: false,
                lastStart: null,
                currentMatchId: null
            });
        }

        // 🏆 RESET TOURNOI
        function resetTournament() {
            db.ref().update({
                match: {
                    teamA: "Team A",
                    teamB: "Team B",
                    scoreTeamA: 0,
                    scoreTeamB: 0,
                    timer: 0,
                    running: false,
                    lastStart: null,
                    currentMatchId: null
                },
                "tournament/matches": [
                    { id: 1, teamA: "A", teamB: "B", scoreA: 0, scoreB: 0, played: false },
                    { id: 2, teamA: "A", teamB: "C", scoreA: 0, scoreB: 0, played: false },
                    { id: 3, teamA: "B", teamB: "C", scoreA: 0, scoreB: 0, played: false }
                ]
            });
        }

        // FULLSCREEN
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen?.();
            } else {
                document.exitFullscreen?.();
            }
        }

        // ⌨️ SHORTCUTS
        document.addEventListener('keydown', e => {
            if (e.key === 'f') toggleFullscreen();

            if (e.code === 'Space') {
                e.preventDefault();
                db.ref('match').once('value').then(snap => {
                    const m = snap.val();
                    m.running ? stopTimer() : startTimer();
                });
            }
        });

        // REFRESH
        setInterval(() => {
            db.ref('match').once('value').then(snap => {
                if (snap.val()) updateTimer(snap.val());
            });
        }, 1000);

    </script>
</body>

</html>
