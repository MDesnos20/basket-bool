<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Basket App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #111;
            color: white;
        }

        /* NAV */
        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background: black;
            padding: 10px;
        }

        .nav button {
            font-size: 18px;
            padding: 10px;
        }

        /* VIEWS */
        .view {
            display: none;
        }

        .active {
            display: block;
        }

        /* MATCH */
        .timer {
            text-align: center;
            font-size: 8vw;
        }

        .teams {
            display: flex;
            height: 60vh;
        }

        .team {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .blue {
            background: #007bff;
        }

        .red {
            background: #dc3545;
        }

        .score {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20vw;
        }

        .buttons {
            display: flex;
            justify-content: space-around;
        }

        .buttons button {
            font-size: 2vw;
        }

        /* TOURNOI */
        .tournament {
            padding: 20px;
        }

        .match-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            background: #222;
            padding: 10px;
        }

        .ranking {
            margin-top: 20px;
        }

        .controls {
            display: flex;
            justify-content: space-around;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="nav">
        <button onclick="showView('match')">🏀 Match</button>
        <button onclick="showView('tournament')">🏆 Tournoi</button>
    </div>

    <!-- MATCH VIEW -->
    <div id="match" class="view active">
        <div class="timer" id="timer">00:00</div>

        <h2 style="text-align:center" id="matchTitle">Team A vs Team B</h2>

        <div class="teams">
            <div class="team blue">
                <div class="score" id="scoreA">0</div>
                <div class="buttons">
                    <button onclick="addScore('A',1)">+1</button>
                    <button onclick="addScore('A',2)">+2</button>
                    <button onclick="addScore('A',3)">+3</button>
                </div>
            </div>

            <div class="team red">
                <div class="score" id="scoreB">0</div>
                <div class="buttons">
                    <button onclick="addScore('B',1)">+1</button>
                    <button onclick="addScore('B',2)">+2</button>
                    <button onclick="addScore('B',3)">+3</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="startTimer()">▶</button>
            <button onclick="stopTimer()">⏸</button>
            <button onclick="resetTimer()">⏱</button>
            <button onclick="validateMatch()">✅ Valider</button>
        </div>
    </div>

    <!-- TOURNOI VIEW -->
    <div id="tournament" class="view tournament">

        <h2>🏆 Matchs</h2>
        <div id="matchList"></div>

        <h2>📊 Classement</h2>
        <div id="ranking"></div>

        <button onclick="resetTournament()">🔄 Reset Tournoi</button>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsK7RYrHeDrBGRabVxCS1S21NxDI87Yy8",
            authDomain: "basket-boule.firebaseapp.com",
            databaseURL: "https://basket-boule-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "basket-boule",
            storageBucket: "basket-boule.firebasestorage.app",
            messagingSenderId: "606953532311",
            appId: "1:606953532311:web:33b0d958a2f3f64a54b2d2",
            measurementId: "G-HFZJDQREW4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // NAV
        function showView(v) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(v).classList.add('active');
        }

        // MATCH LISTENER
        db.ref().on('value', snap => {
            const data = snap.val();
            if (!data) return;

            updateMatch(data.match, data.tournament);
            renderTournament(data.tournament);
        });

        // UPDATE MATCH
        function updateMatch(match, tournament) {
            scoreA.innerText = match.scoreTeamA;
            scoreB.innerText = match.scoreTeamB;

            const teamA = tournament.teams.find(t => t.id === match.teamA);
            const teamB = tournament.teams.find(t => t.id === match.teamB);

            matchTitle.innerText = `${teamA?.name || 'A'} vs ${teamB?.name || 'B'}`;

            updateTimer(match);
        }

        function updateTimer(m) {
            let s = m.timer;
            if (m.running && m.lastStart) {
                s += Math.floor((Date.now() - m.lastStart) / 1000);
            }
            timer.innerText =
                String(Math.floor(s / 60)).padStart(2, '0') + ":" +
                String(s % 60).padStart(2, '0');
        }

        // SCORE
        function addScore(team, val) {
            db.ref('match').transaction(m => {
                if (!m) return m;
                if (team === 'A') m.scoreTeamA += val;
                if (team === 'B') m.scoreTeamB += val;
                return m;
            });
        }

        // TIMER
        function startTimer() { db.ref('match').update({ running: true, lastStart: Date.now() }); }
        function stopTimer() {
            db.ref('match').once('value').then(s => {
                const m = s.val();
                db.ref('match').update({
                    timer: m.timer + Math.floor((Date.now() - m.lastStart) / 1000),
                    running: false, lastStart: null
                });
            });
        }
        function resetTimer() { db.ref('match').update({ timer: 0, running: false, lastStart: null }); }

        // PLAY MATCH
        function playMatch(id) {
            db.ref().once('value').then(s => {
                const data = s.val();
                const match = data.tournament.matches.find(m => m.id === id);

                db.ref('match').set({
                    teamA: match.teamA,
                    teamB: match.teamB,
                    scoreTeamA: 0,
                    scoreTeamB: 0,
                    timer: 0,
                    running: false,
                    lastStart: null,
                    currentMatchId: id
                });

                showView('match');
            });
        }

        // VALIDATE MATCH
        function validateMatch() {
            db.ref().once('value').then(s => {
                const data = s.val();
                const m = data.match;

                db.ref(`tournament/matches/${m.currentMatchId - 1}`).update({
                    scoreA: m.scoreTeamA,
                    scoreB: m.scoreTeamB,
                    played: true
                });

                alert("Match enregistré !");
            });
        }

        // RENDER TOURNOI
        function renderTournament(t) {
            const list = document.getElementById('matchList');
            list.innerHTML = '';

            t.matches.forEach(m => {
                const div = document.createElement('div');
                div.className = 'match-item';

                const teamA = t.teams.find(x => x.id === m.teamA).name;
                const teamB = t.teams.find(x => x.id === m.teamB).name;

                div.innerHTML = `
      ${teamA} vs ${teamB}
      <button onclick="playMatch(${m.id})">▶</button>
    `;

                list.appendChild(div);
            });

            renderRanking(t);
        }

        // CLASSEMENT
        function renderRanking(t) {
            const scores = {};

            t.teams.forEach(team => scores[team.id] = 0);

            t.matches.forEach(m => {
                if (m.played) {
                    if (m.scoreA > m.scoreB) scores[m.teamA]++;
                    if (m.scoreB > m.scoreA) scores[m.teamB]++;
                }
            });

            const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);

            const rankDiv = document.getElementById('ranking');
            rankDiv.innerHTML = '';

            sorted.forEach(([id, pts]) => {
                const name = t.teams.find(t => t.id === id).name;
                rankDiv.innerHTML += `<div>${name} - ${pts} victoires</div>`;
            });
        }

        // RESET
        function resetTournament() {
            location.reload(); // simple reset
        }

    </script>
</body>

</html>
