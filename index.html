<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Basket Scoreboard</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            background: #111;
            color: #fff;
            text-align: center;
        }

        .timer {
            font-size: 5em;
            margin: 20px 0;
        }

        .teams {
            display: flex;
            justify-content: center;
            align-items: stretch;
            height: 300px;
            margin: 20px 0;
        }

        .team {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            color: #fff;
        }

        .team.blue {
            background: #007bff;
        }

        .team.red {
            background: #dc3545;
        }

        .score {
            font-size: 8em;
            margin: 20px 0;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            font-size: 2em;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: #fff;
        }

        .blue button {
            background: rgba(0, 0, 0, 0.2);
        }

        .red button {
            background: rgba(0, 0, 0, 0.2);
        }

        .controls {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .controls button {
            background: #333;
        }
    </style>
</head>

<body>

    <div class="timer" id="timer">00:00</div>

    <div class="controls">
        <button onclick="startTimer()">Play</button>
        <button onclick="stopTimer()">Pause</button>
        <button onclick="resetTimer()">Reset Timer</button>
        <button onclick="resetAll()">Reset Score & Timer</button>
    </div>

    <div class="teams">
        <div class="team blue">
            <div class="buttons">
                <button onclick="addScore('A', -1)">-1</button>
                <button onclick="addScore('A', 1)">+1</button>
                <button onclick="addScore('A', 2)">+2</button>
                <button onclick="addScore('A', 3)">+3</button>
            </div>
            <div class="score" id="scoreA">0</div>
        </div>
        <div class="team red">
            <div class="buttons">
                <button onclick="addScore('B', -1)">-1</button>
                <button onclick="addScore('B', 1)">+1</button>
                <button onclick="addScore('B', 2)">+2</button>
                <button onclick="addScore('B', 3)">+3</button>
            </div>
            <div class="score" id="scoreB">0</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script>
        // 🔥 Remplace par ta config Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCsK7RYrHeDrBGRabVxCS1S21NxDI87Yy8",
            authDomain: "basket-boule.firebaseapp.com",
            databaseURL: "https://basket-boule-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "basket-boule",
            storageBucket: "basket-boule.firebasestorage.app",
            messagingSenderId: "606953532311",
            appId: "1:606953532311:web:33b0d958a2f3f64a54b2d2",
            measurementId: "G-HFZJDQREW4"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Listener temps réel + init si vide
        db.ref('match').on('value', snapshot => {
            let data = snapshot.val();
            if (!data) {
                db.ref('match').set({
                    scoreTeamA: 0,
                    scoreTeamB: 0,
                    timer: 0,
                    running: false,
                    lastStart: null
                });
                data = { scoreTeamA: 0, scoreTeamB: 0, timer: 0, running: false, lastStart: null };
            }

            document.getElementById('scoreA').innerText = data.scoreTeamA;
            document.getElementById('scoreB').innerText = data.scoreTeamB;

            let seconds = data.timer;
            if (data.running && data.lastStart) {
                seconds += Math.floor((Date.now() - data.lastStart) / 1000);
            }
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        });

        function addScore(team, value) {
            db.ref('match').transaction(match => {
                if (match) {
                    if (team === 'A') match.scoreTeamA += value;
                    if (team === 'B') match.scoreTeamB += value;
                    if (match.scoreTeamA < 0) match.scoreTeamA = 0;
                    if (match.scoreTeamB < 0) match.scoreTeamB = 0;
                }
                return match;
            });
        }

        function startTimer() {
            db.ref('match').transaction(match => {
                if (match && !match.running) {
                    match.running = true;
                    match.lastStart = Date.now();
                }
                return match;
            });
        }

        function stopTimer() {
            db.ref('match').transaction(match => {
                if (match && match.running) {
                    match.timer += Math.floor((Date.now() - match.lastStart) / 1000);
                    match.running = false;
                    match.lastStart = null;
                }
                return match;
            });
        }

        function resetTimer() {
            db.ref('match').transaction(match => {
                if (match) {
                    match.timer = 0;
                    match.running = false;
                    match.lastStart = null;
                }
                return match;
            });
        }

        function resetAll() {
            db.ref('match').set({
                scoreTeamA: 0,
                scoreTeamB: 0,
                timer: 0,
                running: false,
                lastStart: null
            });
        }

        // Rafraîchissement toutes les secondes pour timer live
        setInterval(() => {
            db.ref('match').once('value').then(snapshot => {
                const data = snapshot.val();
                let seconds = data.timer;
                if (data.running && data.lastStart) {
                    seconds += Math.floor((Date.now() - data.lastStart) / 1000);
                }
                const m = String(Math.floor(seconds / 60)).padStart(2, '0');
                const s = String(seconds % 60).padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            });
        }, 1000);

    </script>
</body>

</html>
